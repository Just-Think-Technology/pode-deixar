name: Run tests on PR, merge or push to main or develop

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "backend/**"

  pull_request:
    branches:
      - main
      - develop
    paths:
      - "backend/**"

jobs:
  auth-backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
          POSTGRES_DB: auth_test

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:root@localhost:5432/auth_test
      DIRECT_URL: postgresql://postgres:root@localhost:5432/auth_test

      JWT_ACCESS_SECRET: ${{ secrets.TEST_JWT_ACCESS_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.TEST_JWT_REFRESH_SECRET }}

      SMTP_HOST: ${{ secrets.TEST_SMTP_HOST }}
      SMTP_PORT: ${{ secrets.TEST_SMTP_PORT }}
      SMTP_USER: ${{ secrets.TEST_SMTP_USER }}
      SMTP_PASS: ${{ secrets.TEST_SMTP_PASS }}
      SMTP_FROM: ${{ secrets.TEST_SMTP_FROM }}

      FRONTEND_URL: ${{ secrets.TEST_FRONTEND_URL }}

      NODE_ENV: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Build shared logger
        working-directory: backend/shared/logger
        run: npx tsc

      - name: Generate Prisma Client
        working-directory: backend/services/auth
        run: npx prisma generate

      - name: Run Prisma migrations
        working-directory: backend/services/auth
        run: npx prisma migrate deploy

      - name: Run tests
        working-directory: backend/services/auth
        run: npm run test -- --runInBand --coverage