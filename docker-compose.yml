# Pode Deixar - Docker Compose
# Inicializa toda a plataforma com um comando:
#   docker compose up -d
#
# Para rebuildar as imagens:
#   docker compose build
#
# ATENÇÃO: Remove o serviço postgres porque usamos Neon DB externo
# As credenciais do banco ficam em backend/services/*/.env.staging

services:

  # ─── Auth Service ────────────────────────────────────────
  auth:
    build:
      context: ./backend
      target: auth-build
    env_file: ./backend/services/auth/.env.staging
    environment:
      FRONTEND_URL: http://localhost:8080
    ports:
      - "3001:3001"

  # ─── Users Service ───────────────────────────────────────
  users:
    build:
      context: ./backend
      target: users-build
    env_file: ./backend/services/users/.env.staging
    ports:
      - "3002:3002"
    depends_on:
      auth:
        condition: service_started

  # ─── Frontend (Next.js) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8080/api
    ports:
      - "3000:3000"
    depends_on:
      - auth
      - users

  # ─── Proxy Reverso (Caddy) ───────────────────────────────
  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./Caddyfile.docker:/etc/caddy/Caddyfile
    depends_on:
      - auth
      - users
      - frontend
